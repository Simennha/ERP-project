# Local development infrastructure for the ERP system.
# Brings up PostgreSQL (primary datastore) and Redis (reserved for the
# later real-time / pub-sub phase). Credentials here match .env.example.
#
#   docker compose up -d      # start
#   docker compose down       # stop
#   docker compose down -v     # stop and delete data volumes
services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - erp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - erp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp-postgres-data:
  erp-redis-data:
